services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: farm-blog-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - MONGO_URI=${MONGO_URI:-mongodb://mongodb:27017/blog_app}
    volumes:
      - ./backend:/app
    depends_on:
      - mongodb

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
      - REACT_APP_API_URL=http://13.234.202.80:8000
    container_name: farm-blog-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - HOST=0.0.0.0
      - PORT=3000
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend

  mongodb:
    image: mongo:7
    container_name: farm-blog-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
