name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - closed

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      # 3. Setup Node
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      # 4. Install dependencies
      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      # 5. Basic checks
      - name: Backend import check
        run: python -c "import app"
        working-directory: backend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      # 6. Setup Docker
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 7. Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 8. Build & Push Backend Image
      - name: Build & Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/farm-blog-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/farm-blog-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 9. Build & Push Frontend Image
      - name: Build & Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/farm-blog-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/farm-blog-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest

    if: github.ref == 'refs/heads/main' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main')

    steps:
      # 🔐 Deploy to EC2
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT }}
          script: |
            cd ${{ secrets.EC2_APP_PATH }}

            echo "Pulling latest images..."
            docker compose pull

            echo "Stopping old containers..."
            docker compose down

            echo "Starting new containers..."
            docker compose up -d

      # Feature Tracking
      - name: Feature Tracking
        run: |
          curl -X POST "${{ secrets.FEATURE_API_BASE }}/features/" \
          -H "Content-Type: application/json" \
          -d '{"title":"New Deployment","description":"New version deployed via CI/CD"}'
